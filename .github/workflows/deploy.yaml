name: Deploy to Hestia

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Workflows

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            set -e
            cd /home/contact/web/inclusiv.allopro24.com/public_html/inclusive

            echo "=== Reset et pull ==="
            git fetch origin main
            git reset --hard origin/main    # ← force l'écrasement des fichiers locaux

            echo "=== NPM build ==="
            npm ci
            npm run build

            echo "=== Laravel ==="
            /usr/bin/php8.3 artisan migrate --force
            /usr/bin/php8.3 artisan config:cache
            /usr/bin/php8.3 artisan route:cache
            /usr/bin/php8.3 artisan view:clear
            /usr/bin/php8.3 artisan queue:restart

            echo "=== Deploy OK ==="
