name: Deploy to Hestia

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Workflows

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build assets
        run: |
          npm ci
          npm run build

      - name: Upload build via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          username: ${{ secrets.SSH_USER }}
          server: ${{ secrets.SSH_HOST }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          local_path: "./public/build/*"
          remote_path: "/home/contact/web/inclusiv.allopro24.com/public_html/inclusive/public/build/"
          sftp_only: true

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_ADMIN_USER }}
          password: ${{ secrets.SSH_ADMIN_PASSWORD }}
          port: 22
          script: |
            set -e

            sudo -u contact bash -c '
              set -e
              cd /home/contact/web/inclusiv.allopro24.com/public_html/inclusive

              echo "=== Git pull ==="
              git fetch origin main
              git reset --hard origin/main

              echo "=== Composer ==="
              /usr/bin/php8.3 /usr/bin/composer install --no-dev --optimize-autoloader --no-interaction

              echo "=== Laravel ==="
              /usr/bin/php8.3 artisan migrate --force
              /usr/bin/php8.3 artisan config:cache
              /usr/bin/php8.3 artisan route:cache
              /usr/bin/php8.3 artisan view:clear
              /usr/bin/php8.3 artisan queue:restart

              echo "=== Permissions ==="
              chmod -R 775 storage bootstrap/cache public/build

              echo "=== Deploy OK ==="
            '
