name: Deploy to Hestia

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Build assets
        run: |
          npm install
          npm run build

      - name: Copy build to server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          source: "public/build"
          target: "/home/contact/web/inclusiv.allopro24.com/public_html/inclusive/public"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            sudo su -s /bin/bash contact -c "
              cd /home/contact/web/inclusiv.allopro24.com/public_html/inclusive &&
              git pull origin main &&
              /usr/bin/php8.3 artisan migrate --force &&
              /usr/bin/php8.3 artisan config:clear &&
              /usr/bin/php8.3 artisan cache:clear &&
              /usr/bin/php8.3 artisan view:clear &&
              /usr/bin/php8.3 artisan queue:restart
            "
