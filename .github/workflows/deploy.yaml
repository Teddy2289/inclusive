name: Deploy to Hestia

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Workflows

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          script: |
            set -e
            cd /home/contact/web/inclusiv.allopro24.com/public_html/inclusive

            echo "=== Git pull ==="
            git fetch origin main
            git reset --hard origin/main

            echo "=== Node build ==="
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            node -v
            npm ci
            npm run build

            echo "=== Composer ==="
            /usr/bin/php8.3 /usr/local/bin/composer install --no-dev --optimize-autoloader --no-interaction

            echo "=== Laravel ==="
            /usr/bin/php8.3 artisan migrate --force
            /usr/bin/php8.3 artisan config:cache
            /usr/bin/php8.3 artisan route:cache
            /usr/bin/php8.3 artisan view:clear
            /usr/bin/php8.3 artisan queue:restart

            echo "=== Permissions ==="
            chmod -R 775 storage bootstrap/cache public/build

            echo "=== Deploy OK ==="
